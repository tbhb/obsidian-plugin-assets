---
name: ci

on:
  pull_request:
  push:
    branches:
      - main
      - beta

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22.22.0"
  RUMDL_VERSION: "0.1.69"
  VALE_VERSION: "3.14.1"
  YAMLLINT_VERSION: "1.38.0"
  # Opt JS-based actions into the Node 24 runtime early (the default flip
  # happens 2026-06-02). Silences deprecation warnings on older actions.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320  # v5.0.0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint code (biome + eslint)
        run: pnpm run lint

      - name: Lint dependency graph (dependency-cruiser)
        run: pnpm run lint:deps

      - name: Lint duplicate code (jscpd)
        run: pnpm run lint:jscpd

      - name: Lint dead code (knip)
        run: pnpm run lint:knip

      - name: Check spelling (cspell)
        run: pnpm run lint:spelling

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0

      - name: Lint YAML (yamllint via uvx)
        run: uvx --from "yamllint==${YAMLLINT_VERSION}" yamllint --strict .

      - name: Lint GitHub Actions workflows (actionlint)
        uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d  # v1.72.0
        with:
          fail_level: error

  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    # Matrix the build across Linux, macOS, and Windows so cross-platform
    # path handling and OS-specific typecheck or build regressions surface
    # before a contributor hits them locally.
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64
            runner: ubuntu-latest
          - platform: darwin-arm64
            runner: macos-14
          - platform: win32-x64
            runner: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320  # v5.0.0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck (src + test)
        run: pnpm run typecheck

      - name: Build library
        run: pnpm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: library-build-${{ matrix.platform }}
          path: dist/
          retention-days: 7
          if-no-files-found: error

  test:
    name: Test (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    # Matrix the test tiers across OSes so cross-platform path regressions
    # in the integration vault fixture (and anything the property tier
    # exercises) surface in CI rather than on a contributor's machine.
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64
            runner: ubuntu-latest
          - platform: darwin-arm64
            runner: macos-14
          - platform: win32-x64
            runner: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320  # v5.0.0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests with coverage
        run: pnpm run test:coverage

      - name: Run integration tests
        run: pnpm run test:integration

      - name: Run property tests
        run: pnpm run test:property

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: coverage-${{ matrix.platform }}
          path: coverage/
          retention-days: 7
          if-no-files-found: ignore

  danger:
    name: Danger
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320  # v5.0.0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Danger
        run: pnpm run danger:ci
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  documentation:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install rumdl
        run: |
          set -euo pipefail
          url="https://github.com/rvben/rumdl/releases/download/v${RUMDL_VERSION}/rumdl-v${RUMDL_VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          curl -fsSL "$url" -o /tmp/rumdl.tar.gz
          mkdir -p /tmp/rumdl
          tar -xzf /tmp/rumdl.tar.gz -C /tmp/rumdl
          sudo install -m 0755 "$(find /tmp/rumdl -type f -name rumdl -print -quit)" /usr/local/bin/rumdl
          rumdl --version

      - name: Install vale
        run: |
          set -euo pipefail
          url="https://github.com/errata-ai/vale/releases/download/v${VALE_VERSION}/vale_${VALE_VERSION}_Linux_64-bit.tar.gz"
          curl -fsSL "$url" -o /tmp/vale.tar.gz
          mkdir -p /tmp/vale
          tar -xzf /tmp/vale.tar.gz -C /tmp/vale
          sudo install -m 0755 /tmp/vale/vale /usr/local/bin/vale
          vale --version

      - name: Cache Vale style packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            .vale/Google
            .vale/ai-tells
            .vale/ai-tells-commits
            .vale/ai-tells-experimental
            .vale/proselint
            .vale/write-good
            .vale/config/scripts
          key: vale-${{ env.VALE_VERSION }}-${{ hashFiles('.vale.ini') }}

      - name: Sync Vale packages
        run: vale sync

      - name: Lint Markdown (rumdl)
        run: rumdl check .

      - name: Lint prose (vale)
        run: vale --glob='!{.vale/**,node_modules/**,coverage/**,dist/**,CHANGELOG.md}' .
