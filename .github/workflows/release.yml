---
name: release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

env:
  NODE_VERSION: "22.22.0"
  # Opt JS-based actions into the Node 24 runtime early (the default flip
  # happens 2026-06-02). Silences deprecation warnings on any transitive
  # action that still targets Node 20.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  release-please:
    name: release-please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      # The default GITHUB_TOKEN is subject to GitHub's recursion-prevention
      # rule: pushes it authors do not trigger other workflows. That means
      # release-please PRs never run CI, and the maintainer has to push an
      # empty commit to unblock the merge gate. Swap in a token minted from
      # the `tbhb-releases` GitHub App so the PR branch push fires CI the
      # same as any human-authored push. Apps also bypass the
      # first-time-contributor workflow-approval gate on forks.
      - name: Mint release bot token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3  # v3.1.1
        with:
          app-id: ${{ vars.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7  # v5.0.0
        with:
          token: ${{ steps.app-token.outputs.token }}
          target-branch: main
          config-file: .github/release-please-config.json
          manifest-file: .github/release-please-manifest.json

  publish-release:
    name: build + publish to npm
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    # Bind to the `npm` GitHub environment so the OIDC token carries an
    # `environment` claim. The npm trusted publisher config pins that claim,
    # so only runs of this job from this environment can publish.
    environment:
      name: npm
      url: https://www.npmjs.com/package/obsidian-plugin-assets
    # Override workflow-level permissions for least privilege. This job needs:
    #   - contents: write  →  to upload assets to the GitHub release
    #   - id-token: write  →  to request the OIDC token for sigstore keyless
    #                         signing (npm provenance + build attestation)
    #   - attestations: write  →  to write the build attestation to the repo
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320  # v5.0.0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build library
        run: pnpm run build

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4.1.0
        with:
          subject-path: |
            dist/index.js
            dist/index.d.ts

      # npm trusted publishing requires npm >= 11.5.1. Node 22.22.0 ships with
      # npm 10.9.2, so we upgrade the CLI here before publishing. Auth goes
      # through npm's OIDC flow: no NPM_TOKEN involved, no registry-url setup
      # needed — npm exchanges the GitHub Actions OIDC token for a short-lived
      # publish credential, and `--provenance` records that same identity on
      # the package.
      - name: Upgrade npm for trusted publishing
        run: npm install --global npm@latest

      - name: Publish to npm
        run: |
          set -euo pipefail
          # Version strings with a prerelease qualifier (e.g. 0.1.0-beta.2)
          # publish under the `beta` dist-tag so `npm install
          # obsidian-plugin-assets` keeps resolving to the latest stable
          # release. The tag_name from release-please doubles as the version
          # here (release-please emits tags without a `v` prefix).
          tag='${{ needs.release-please.outputs.tag_name }}'
          if [[ "$tag" == *-* ]]; then
            npm publish --provenance --access public --tag beta
          else
            npm publish --provenance --access public
          fi
